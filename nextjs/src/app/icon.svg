<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e5c87"/>
      <stop offset="100%" stop-color="#083a58"/>
    </linearGradient>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>

  <!-- Subtle sky-blue border ring -->
  <rect x="16" y="16" width="480" height="480" rx="72" fill="none" stroke="#38bdf8" stroke-width="5" opacity="0.25"/>

  <!-- "TN" monogram in white -->
  <text
    x="256"
    y="272"
    text-anchor="middle"
    dominant-baseline="middle"
    font-family="'Courier New', Courier, ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace"
    font-weight="700"
    font-size="218"
    fill="#ffffff">TN</text>

  <!-- Sky-blue cursor underscore (matches "TN_" brand) -->
  <rect x="140" y="354" width="232" height="18" rx="4" fill="#0ea5e9"/>
</svg>
