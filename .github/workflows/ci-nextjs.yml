name: CI Next.js

on:
  push:
    paths:
      - nextjs/**
      - .github/workflows/ci-nextjs.yml
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nextjs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nextjs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run CI checks
        run: npm run ci

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    defaults:
      run:
        working-directory: nextjs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nextjs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build for E2E
        # opennextjs-cloudflare preview（wrangler dev）が必要とする .open-next/ を生成する。
        run: npx opennextjs-cloudflare build

      - name: Seed E2E data
        # Playwright は webServer（wrangler dev）を globalSetup より先に起動する。
        # wrangler dev は起動時に D1 を内部にロードするため、
        # globalSetup が起動後にシードしても miniflare には反映されない。
        # そのため、wrangler dev が起動する前にマイグレーション適用とシードを実施する。
        run: |
          npm run db:migrate:local
          npx wrangler d1 execute portfolio-db --local --file=e2e/fixtures/seed-e2e.sql

      - name: Run E2E tests
        run: npm run test:e2e