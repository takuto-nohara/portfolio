name: CI Next.js

on:
  push:
    paths:
      - nextjs/**
      - .github/workflows/ci-nextjs.yml
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nextjs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nextjs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run CI checks
        run: npm run ci

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    defaults:
      run:
        working-directory: nextjs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: nextjs/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build for E2E
        # opennextjs-cloudflare preview（wrangler dev）が必要とする .open-next/ を生成する。
        # next dev + getPlatformProxy() は CI 環境で D1 バインディングが不安定なため、
        # 実際の Cloudflare Workers ランタイムを使った preview でテストする。
        run: npx opennextjs-cloudflare build

      - name: Run E2E tests
        # globalSetup が D1 マイグレーション適用・シードを行い、
        # その後 opennextjs-cloudflare preview がサーバーを起動する。
        run: npm run test:e2e